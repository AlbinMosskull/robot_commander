syntax = "proto3";

package agent;

service AgentControl {
  rpc SetCheckpoint (Position) returns (Empty);
  rpc SetPath (Path) returns (Empty);
  rpc SetEscapePlan (Path) returns (Empty);
  rpc ObservePosition (PositionObservation) returns (Empty);
  rpc StreamPosition (Empty) returns (stream Position);
  rpc StreamAgentUpdate (Empty) returns (stream AgentUpdate);
  rpc RunCommand (CommandRequest) returns (Empty);
  rpc Scout (Empty) returns (Empty);
}

message Path {
  repeated Position waypoints = 1;
  optional float final_heading = 2;
}

message Position {
  float x = 1;
  float y = 2;
  float heading = 3;
}

message Ray {
  float start_x = 1;
  float start_y = 2;
  float end_x = 3;
  float end_y = 4;
  bool did_collide = 5;
}

message RayBatch {
  repeated Ray rays = 1;
}

message PositionObservation {
  float x = 1;
  float y = 2;
  float heading = 3;
  float confidence = 4;
}

message ConeReading {
  float ultrasonic_min_m = 1;
  float heading = 2;
}

message AgentUpdate {
  bytes camera_frame_jpg = 1;
  oneof sensor_readings {
    RayBatch ray_batch = 2;
    ConeReading cone = 3;
  }
}

message CommandRequest {
  string command = 1;
  float duration_s = 2;
}

message Empty {}
