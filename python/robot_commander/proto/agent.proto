syntax = "proto3";

package agent;

service AgentControl {
  rpc SetCheckpoint (Position) returns (Empty);
  rpc SetPath (Path) returns (Empty);
  rpc SetEscapePlan (Path) returns (Empty);
  rpc ObservePosition (PositionObservation) returns (Empty);
  rpc StreamPosition (Empty) returns (stream Position);
  rpc StreamRays (Empty) returns (stream RayBatch);
}

message Path {
  repeated Position waypoints = 1;
}

message Position {
  float x = 1;
  float y = 2;
}

message Ray {
  float start_x = 1;
  float start_y = 2;
  float end_x = 3;
  float end_y = 4;
  bool did_collide = 5;
}

message RayBatch {
  repeated Ray rays = 1;
}

message PositionObservation {
  float x = 1;
  float y = 2;
  float confidence = 3;
}

message Empty {}
