camera:
  device_index: 0
  width: 2560
  height: 1440
  preview_width: 960
  preview_height: 540
  # Lower => shorter shutter => less motion blur, but darker image.
  exposure: 400

checkerboard:
  cols: 9
  rows: 6
  square_size_m: 0.025

tag:
  size_m: 0.03

agent:
  v_forward_m_s: 0.045
  heading_offset_deg: 87

connection:
  host: 192.168.0.43
  simulated_host: localhost
  port: 50051

map:
  stencil_path: plots/output/stencil_map.json

depth:
  cone_half_angle_deg: 15.0
  camera_up: [0.0, -1.0, 0.0]
